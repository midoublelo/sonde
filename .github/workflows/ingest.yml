name: tube and weather ingestion data

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}  # lets you trigger a run manually from the Actions tab

permissions:
  contents: write  # needed so the "commit updated database" step can push.
                    # Without this, many orgs/repos default Actions to
                    # read-only and the push silently fails with a 403.
concurrency:
  group: tube-ingestion
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ingestion
        env:
          TFL_APP_KEY: ${{ secrets.TFL_APP_KEY }}
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
        run: python -m scripts.run_ingestion

      - name: Commit updated logs
        run: |
          git config user.name "tube-bot"
          git config user.email "tube-bot@users.noreply.github.com"
          git add data/logs/tube_status.jsonl data/logs/weather.jsonl
          git diff --staged --quiet || git commit -m "Ingest: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git pull --rebase --autostash
          git push