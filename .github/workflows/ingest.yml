name: Ingest Tube status

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}  # lets you trigger a run manually from the Actions tab

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ingestion
        env:
          TFL_APP_KEY: ${{ secrets.TFL_APP_KEY }}
        run: python -m scripts.run_ingestion

      - name: Commit updated database
        run: |
          git config user.name "tube-bot"
          git config user.email "tube-bot@users.noreply.github.com"
          git add data/tube.db
          git diff --staged --quiet || git commit -m "Ingest: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
